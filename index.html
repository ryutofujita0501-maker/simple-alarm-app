<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>どうぶつピース道場</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <section class="game-stage">
        <header class="topbar">
          <div>
            <p class="kicker">こどもパズル</p>
            <h1>どうぶつピース道場</h1>
          </div>
          <div class="top-tools">
            <label class="piece-picker">
              <span>ピース</span>
              <select id="pieceSelect" aria-label="ピース数">
                <option value="4">4</option>
                <option value="6">6</option>
                <option value="9">9</option>
                <option value="12">12</option>
                <option value="16">16</option>
              </select>
            </label>
            <div class="score-card" aria-label="スコア">
              <span class="score-label">きらきら</span>
              <span id="starScore" class="score-value">0</span>
            </div>
          </div>
        </header>

        <section class="control-strip" aria-label="ゲーム設定">
          <div class="segmented" role="group" aria-label="むずかしさ">
            <button class="level-button is-active" type="button" data-level="yasashii">やさしい</button>
            <button class="level-button" type="button" data-level="kantan">かんたん</button>
            <button class="level-button" type="button" data-level="futsu">ふつう</button>
            <button class="level-button" type="button" data-level="muzukashii">むずかしい</button>
            <button class="level-button oni" type="button" data-level="oni">鬼</button>
          </div>
          <div class="tool-buttons">
            <select id="animalSelect" class="animal-select" aria-label="どうぶつ">
              <option value="lion">ライオン</option>
              <option value="koala">コアラ</option>
              <option value="giraffe">キリン</option>
              <option value="dog">犬</option>
              <option value="cat">猫</option>
            </select>
            <button id="hintButton" class="icon-button" type="button" aria-label="ヒント">
              <span aria-hidden="true">?</span>
            </button>
            <button id="resetButton" class="icon-button" type="button" aria-label="さいしょから">
              <span aria-hidden="true">↻</span>
            </button>
          </div>
        </section>

        <section class="status-panel">
          <div class="mascot" aria-hidden="true">
            <div class="mascot-face">
              <span></span>
              <span></span>
            </div>
          </div>
          <p id="messageText">ピースをならべて、どうぶつを完成させよう。</p>
          <div class="progress-wrap" aria-label="すすみぐあい">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </section>

        <section class="play-area" aria-label="パズルエリア">
          <div class="board-wrap">
            <div id="preview" class="preview" aria-label="完成見本"></div>
            <div id="board" class="board"></div>
          </div>
          <div id="tray" class="tray" aria-label="ピース置き場"></div>
        </section>
      </section>
      <canvas id="confettiCanvas" aria-hidden="true"></canvas>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
