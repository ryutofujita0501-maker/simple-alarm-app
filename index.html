<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アラーム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
    }

    .clock {
      font-size: 72px;
      font-weight: 200;
      letter-spacing: 4px;
      color: #f0f0f0;
    }

    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 32px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="time"] {
      width: 100%;
      background: #2a2a2a;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 32px;
      color: #fff;
      text-align: center;
      outline: none;
      cursor: pointer;
    }

    input[type="time"]::-webkit-calendar-picker-indicator {
      display: none;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    #setBtn {
      background: #fff;
      color: #000;
    }

    #stopBtn {
      background: #ff3b30;
      color: #fff;
      display: none;
    }

    .alarm-list {
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .alarm-item {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .alarm-item span {
      font-size: 24px;
      font-weight: 300;
    }

    .alarm-item .delete {
      background: none;
      border: none;
      color: #555;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      width: auto;
    }

    .alarm-item .delete:hover { color: #ff3b30; }

    .ringing {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 10;
    }

    .ringing.show { display: flex; }

    .ringing .time-display {
      font-size: 80px;
      font-weight: 200;
      animation: pulse 1s infinite;
    }

    .ringing p { color: #888; font-size: 18px; }

    .ringing button {
      width: 200px;
      background: #fff;
      color: #000;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div class="clock" id="clock">00:00:00</div>

  <div class="card">
    <h2>アラームを設定</h2>
    <input type="time" id="timeInput" value="07:00">
    <button id="setBtn">セット</button>
  </div>

  <div class="alarm-list" id="alarmList"></div>

  <div class="ringing" id="ringing">
    <div class="time-display" id="ringingTime"></div>
    <p>アラーム！</p>
    <button onclick="stopAlarm()">止める</button>
  </div>

  <audio id="beep" loop>
    <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA..." type="audio/wav">
  </audio>

  <script>
    let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
    let ringing = false;
    let audioCtx = null;
    let beepSource = null;

    function startBeep() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function beep() {
        if (!ringing) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
        if (ringing) setTimeout(beep, 700);
      }
      beep();
    }

    function stopAlarm() {
      ringing = false;
      document.getElementById('ringing').classList.remove('show');
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
    }

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;

      const hm = `${h}:${m}`;
      if (s === '00' && alarms.includes(hm) && !ringing) {
        ringing = true;
        document.getElementById('ringingTime').textContent = hm;
        document.getElementById('ringing').classList.add('show');
        startBeep();
      }
    }

    function renderAlarms() {
      const list = document.getElementById('alarmList');
      list.innerHTML = '';
      alarms.forEach((time, i) => {
        const item = document.createElement('div');
        item.className = 'alarm-item';
        item.innerHTML = `<span>${time}</span><button class="delete" onclick="deleteAlarm(${i})">✕</button>`;
        list.appendChild(item);
      });
    }

    function deleteAlarm(i) {
      alarms.splice(i, 1);
      localStorage.setItem('alarms', JSON.stringify(alarms));
      renderAlarms();
    }

    document.getElementById('setBtn').addEventListener('click', () => {
      const val = document.getElementById('timeInput').value;
      if (!val) return;
      if (!alarms.includes(val)) {
        alarms.push(val);
        alarms.sort();
        localStorage.setItem('alarms', JSON.stringify(alarms));
        renderAlarms();
      }
    });

    renderAlarms();
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
